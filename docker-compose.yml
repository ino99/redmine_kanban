services:
  redmine-kanban:
    build: .
    env_file:
      - .env
    environment:
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    network_mode: host
    volumes:
      - ./redmine_issues.py:/app/redmine_issues.py:ro
    command: ["python", "redmine_issues.py", "--serve", "--host", "127.0.0.1", "--port", "${KANBAN_PORT:-8015}"]
